<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARSA Command Center</title>

<style>
body{
    background:#020b18;
    color:#00ffff;
    font-family:Consolas, monospace;
}

.header{
    padding:20px;
    border-bottom:2px solid #00ffff;
    text-align:center;
    box-shadow:0 0 15px #00ffff;
}

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    border-right:2px solid #00ffff;
    padding:20px;
}

.sidebar a{
    display:block;
    color:#00ffff;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #00ffff;
}

.sidebar a:hover{
    background:#00ffff;
    color:#000;
}

.main{
    flex:1;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    border:1px solid #00ffff;
    padding:20px;
    min-height:150px;
    box-shadow:0 0 10px #00ffff;
}
</style>
</head>

<body>

<div class="header">
    <h1>MARSA COMMAND CENTER</h1>
    <p id="userInfo">Checking system access...</p>
</div>

<div class="container">

<div class="sidebar">

<a href="founders.html">Founding Council</a>
<a href="personnel.html">Personnel</a>
<a href="missions.html">Missions</a>
<a href="engineering.html">Engineering</a>
<a href="research.html">Research</a>
<a href="reports.html">Reports</a>
<a href="settings.html">Settings</a>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>System Status</h3>
<br>
<span id="sysStatus">ONLINE</span>
</div>

<div class="card">
<h3>Logged In User</h3>
<br>
<span id="userRole">UNKNOWN</span>
</div>

<div class="card">
<h3>Security Level</h3>
<br>
<span id="security">LOW</span>
</div>

<div class="card">
<h3>MARSA AI</h3>
<br>
ONLINE
</div>

</div>

</div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("marsa_user"));

if(!user){
    document.getElementById("userInfo").innerText = "NO ACCESS - REDIRECTING...";
    setTimeout(()=>{
        window.location.href = "login.html";
    },1500);
}else{

    document.getElementById("userInfo").innerText =
        "WELCOME " + user.id + " (" + user.role + ")";

    document.getElementById("userRole").innerText = user.role;

    // SECURITY LEVEL LOGIC
    let level = "LOW";

    if(user.role === "FOUNDER"){
        level = "MAXIMUM";
    }else if(user.role === "ENGINEER"){
        level = "MEDIUM";
    }

    document.getElementById("security").innerText = level;
}
</script>

</body>
</html>
