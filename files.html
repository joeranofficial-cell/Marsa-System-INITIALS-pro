<!DOCTYPE html>
<html>

<head>

<title>MARSA FILE CENTER</title>

<style>

body{
margin:0;
background:#020611;
color:#00eaff;
font-family:'Segoe UI',sans-serif;
}


.header{

padding:30px;
text-align:center;
background:#061426;
box-shadow:0 0 25px #00eaff;

}


h1{

font-size:40px;
letter-spacing:10px;

}



.panel{

width:85%;
margin:30px auto;
background:#071a30;
padding:30px;
border-radius:20px;
border:1px solid #00eaff;
box-shadow:0 0 25px #003b66;

}



input,textarea{

width:100%;
padding:15px;
margin:10px 0;

background:#020914;
color:white;

border:1px solid #00eaff;
border-radius:10px;

}



button{

background:#00eaff;
border:none;
padding:15px 30px;
border-radius:20px;
cursor:pointer;
font-weight:bold;

}



.file{

background:#020914;
margin-top:20px;
padding:20px;
border-radius:15px;

}



</style>

</head>



<body>



<div class="header">

<h1>MARSA FILE CENTER</h1>

<p>SECURE INFORMATION STORAGE</p>

</div>




<div class="panel">


<h2>CREATE RECORD</h2>


<input id="name" placeholder="FILE TITLE">


<textarea id="text"
placeholder="WRITE INFORMATION"></textarea>



<button onclick="saveFile()">
SAVE RECORD
</button>



<h2>STORED FILES</h2>


<div id="files"></div>


</div>




<script>


let files =

JSON.parse(
localStorage.getItem("MARSA_FILES")
) || [];




function saveFile(){


let name =
document.getElementById("name").value;


let text =
document.getElementById("text").value;



if(name){


files.push({

title:name,

content:text,

date:new Date().toLocaleString()

});



localStorage.setItem(
"MARSA_FILES",
JSON.stringify(files)
);



showFiles();


}

}




function showFiles(){


let box =
document.getElementById("files");


box.innerHTML="";



files.forEach(f=>{


box.innerHTML +=

`

<div class="file">

<h3>${f.title}</h3>

<p>${f.content}</p>

<small>${f.date}</small>

</div>

`;

});


}



showFiles();


</script>



</body>

</html>
