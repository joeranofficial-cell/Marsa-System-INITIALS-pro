<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARSA System Boot</title>

<style>
body{
    margin:0;
    background:#020b18;
    color:#00ffff;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#terminal{
    width:90%;
    max-width:900px;
    font-size:18px;
    line-height:1.7;
    text-shadow:0 0 10px #00ffff;
}

.cursor{
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const lines = [
"MARSA",
"",
"Mars Aerospace Research & Space Administration",
"",
"Initializing Core Systems...",
"Loading Personnel Database...",
"Loading Engineering Division...",
"Loading Research Division...",
"Loading Mission Control...",
"Starting MARSA AI...",
"Verifying Founder Records...",
"",
"[ F001 ] KATENDE MARVIN EINSTEIN",
"[ F002 ] ZZIWA UMAR",
"[ F003 ] JOEL DAVID MUNJI",
"",
"System Status: ONLINE",
"",
"WELCOME COMMANDER"
];

let lineIndex = 0;

function typeLine(text, callback){
    let charIndex = 0;
    let p = document.createElement("div");
    terminal.appendChild(p);

    function typeChar(){
        if(charIndex < text.length){
            p.innerHTML = text.substring(0,charIndex+1) +
            '<span class="cursor">|</span>';
            charIndex++;
            setTimeout(typeChar,25);
        }else{
            p.innerHTML = text;
            callback();
        }
    }
    typeChar();
}

function nextLine(){
    if(lineIndex < lines.length){
        typeLine(lines[lineIndex], ()=>{
            lineIndex++;
            setTimeout(nextLine,150);
        });
    }else{
        setTimeout(()=>{
            window.location.href="login.html";
        },3000);
    }
}

nextLine();
</script>

</body>
</html>
