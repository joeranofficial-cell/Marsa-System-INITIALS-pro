<!DOCTYPE html>
<html>

<head>

<title>MARSA PROJECTS</title>

<style>

body{
margin:0;
background:#020611;
color:#00eaff;
font-family:'Segoe UI',sans-serif;
}


.header{

padding:30px;
text-align:center;
background:#061426;
box-shadow:0 0 25px #00eaff;

}


h1{

font-size:40px;
letter-spacing:10px;

}



.panel{

width:85%;
margin:30px auto;

background:#071a30;

padding:30px;

border-radius:20px;

border:1px solid #00eaff;

box-shadow:0 0 25px #003b66;

}



input,textarea{

width:100%;

padding:15px;

margin:10px 0;

background:#020914;

color:white;

border:1px solid #00eaff;

border-radius:10px;

}



button{

background:#00eaff;

border:0;

padding:15px 30px;

border-radius:20px;

cursor:pointer;

font-weight:bold;

}



.project{

margin-top:20px;

padding:20px;

background:#020914;

border-radius:15px;

}



</style>

</head>



<body>



<div class="header">

<h1>MARSA PROJECTS</h1>

<p>MISSION RECORD CENTER</p>

</div>



<div class="panel">


<h2>CREATE PROJECT</h2>


<input id="title"
placeholder="PROJECT NAME">


<textarea id="details"
placeholder="PROJECT DETAILS"></textarea>


<button onclick="addProject()">
SAVE PROJECT
</button>



<h2>PROJECT DATABASE</h2>


<div id="list">

</div>


</div>




<script>


let projects =
JSON.parse(
localStorage.getItem("MARSA_PROJECTS")
) || [];



function addProject(){


let title =
document.getElementById("title").value;


let details =
document.getElementById("details").value;



if(title){


projects.push({

name:title,

info:details,

date:new Date().toLocaleString()

});


localStorage.setItem(
"MARSA_PROJECTS",
JSON.stringify(projects)
);



display();


}


}



function display(){


let box =
document.getElementById("list");


box.innerHTML="";


projects.forEach(p=>{


box.innerHTML +=

`
<div class="project">

<h3>${p.name}</h3>

<p>${p.info}</p>

<small>${p.date}</small>

</div>

`;

});


}


display();


</script>



</body>

</html>
